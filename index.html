document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

kground:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 8s ease-in-out infinite .4s;\"><\u002Fdiv>\n    <div style=\"position:absolute; top:70%; left:12%; width:1px; height:1px; border-radius:50%; background:#f0d68a; box-shadow:0 0 5px 1px rgba(231,200,121,.6); animation:twinkle 5.5s ease-in-out infinite 2.1s;\"><\u002Fdiv>\n    <div style=\"position:absolute; top:85%; left:60%; width:2px; height:2px; border-radius:50%; background:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 7.5s ease-in-out infinite 1.2s;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-heart=\"\" aria-hidden=\"true\" style=\"position:fixed; inset:0; z-index:0; pointer-events:none; display:flex; align-items:center; justify-content:center; opacity:0; will-change:opacity,transform;\">\n    <div style=\"font-family:'Times New Roman', serif; font-size:min(26vh, 44vw); line-height:1; color:#e7c879; filter:blur(4.5px); text-shadow:0 0 46px rgba(231,200,121,.55); transform:translateY(-2vh);\">♥<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div aria-hidden=\"true\" style=\"position:fixed; inset:0; pointer-events:none; z-index:2; background:radial-gradient(70% 55% at 50% 45%, transparent 0%, transparent 55%, rgba(6,5,4,.55) 100%);\"><\u002Fdiv>\n\n  <div style=\"position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 clamp(22px, 7vw, 32px);\">\n\n    <div style=\"height:46vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; text-align:center; padding-bottom:6vh;\">\n      <div style=\"font-size:clamp(11px, 3vw, 13px); letter-spacing:.42em; text-transform:uppercase; color:rgba(231,200,121,.5); margin-bottom:clamp(20px, 5vw, 26px);\">una carta para<\u002Fdiv>\n      <div style=\"font-size:clamp(38px, 11vw, 54px); font-style:italic; line-height:1.15; color:#f2d898; text-shadow:0 0 24px rgba(231,200,121,.25);\">Hanna<\u002Fdiv>\n      <div style=\"margin-top:40px; font-size:12px; letter-spacing:.3em; color:rgba(231,200,121,.35); animation:twinkle 4s ease-in-out infinite;\">desliza para leer<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-letter=\"\" style=\"padding-bottom:8vh;\">\n      <sc-for list=\"{{ lines }}\" as=\"line\" hint-placeholder-count=\"12\">\n        <p data-line=\"\" style=\"margin:0; font-size:clamp(19px, 5.4vw, 25px); line-height:1.95; text-align:center; will-change:filter,opacity,transform;\">{{ line }}<\u002Fp>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"height:46vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; text-align:center; padding-top:8vh;\">\n      <div style=\"width:60px; height:1px; background:linear-gradient(90deg, transparent, rgba(231,200,121,.5), transparent); margin-bottom:34px;\"><\u002Fdiv>\n      <div style=\"font-size:clamp(15px, 4vw, 18px); font-style:italic; color:rgba(231,200,121,.7); margin-bottom:14px;\">With an aggressive fart,<\u002Fdiv>\n      <div style=\"font-size:clamp(26px, 7vw, 32px); font-style:italic; color:#f2d898; text-shadow:0 0 20px rgba(231,200,121,.25);\">Chancho<\u002Fdiv>\n      <div style=\"margin-top:clamp(56px, 16vh, 120px); font-size:clamp(13px, 3.6vw, 15px); font-style:italic; color:rgba(231,200,121,.4);\">PD: I found the onions 🧅<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820},&quot;lines&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string[]&quot;,&quot;default&quot;:null}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      lines: this.props.lines ?? CARTA.split(\"\\n\"),\n      setRoot: (el) => { this._root = el; },\n    };\n  }\n\n  componentDidMount() {\n    this._update = this._update.bind(this);\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => { this._raf = null; this._update(); });\n    };\n    this._collect();\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    // run a couple of times as content/fonts settle\n    this._update();\n    setTimeout(() => { this._collect(); this._update(); }, 60);\n    setTimeout(() => { this._collect(); this._update(); }, 400);\n  }\n\n  componentDidUpdate() { this._collect(); this._update(); }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n    if (this._raf) cancelAnimationFrame(this._raf);\n  }\n\n  _collect() {\n    if (!this._root) return;\n    this._els = Array.from(this._root.querySelectorAll('[data-line]'));\n    this._heart = this._root.querySelector('[data-heart]');\n    this._heartLine = this._els.find(\n      (el) => el.textContent.trim() === \"I'm giving you back your heart.\"\n    );\n  }\n\n  _update() {\n    if (!this._els || !this._els.length) return;\n    const vh = window.innerHeight;\n    const focal = vh * 0.45;          // the \"reading\" line sits a little above center\n    const range = vh * 0.42;          // distance over which a line fades out\n    for (const el of this._els) {\n      const r = el.getBoundingClientRect();\n      const mid = r.top + r.height / 2;\n      const d = Math.abs(mid - focal);\n      const n = Math.min(d / range, 1);          // 0 = focused, 1 = far\n      const eased = n * n;                        // sharpen the focus\n      const opacity = Math.max(0.04, 1 - eased * 1.05);\n      const blur = (eased * 7).toFixed(2);\n      const glow = (1 - eased) * 18;\n      const lift = (mid < focal ? -1 : 1) * eased * 6; // subtle parallax away from focus\n      const scale = 1 - eased * 0.04;\n      el.style.opacity = opacity.toFixed(3);\n      el.style.filter = `blur(${blur}px)`;\n      el.style.transform = `translateY(${lift.toFixed(1)}px) scale(${scale.toFixed(3)})`;\n      el.style.color = `rgba(${242 - eased * 40}, ${216 - eased * 50}, ${152 - eased * 60}, 1)`;\n      el.style.textShadow = glow > 0.4 ? `0 0 ${glow.toFixed(1)}px rgba(231,200,121,${(1 - eased) * 0.45})` : 'none';\n    }\n\n    // faint background heart: a one-shot bloom when the \"giving back your heart\" line reaches focus\n    if (this._heart && this._heartLine) {\n      const r = this._heartLine.getBoundingClientRect();\n      const mid = r.top + r.height / 2;\n      const d = Math.abs(mid - focal);\n      if (d < vh * 0.16 && !this._heartFired) {\n        this._heartFired = true;\n        this._heart.style.animation = 'none';\n        void this._heart.offsetWidth;          // force reflow so the animation can restart\n        this._heart.style.animation = 'heartBloom 3.2s ease-out forwards';\n      } else if (d > vh * 0.45) {\n        this._heartFired = false;              // re-arm once the line scrolls away\n      }\n    }\n  }\n}\n\n// ╔════════════════════════════════════════════════════════════════╗\n// ║  TU CARTA — escribe aquí entre los acentos invertidos (`).      ║\n// ║  Deja una línea EN BLANCO para separar párrafos.               ║\n// ╚════════════════════════════════════════════════════════════════╝\nconst CARTA = `I don't remember the last time I opened my heart\nand I deeply regret having to do so\nunder the current conditions that I myself caused,\nhowever I ask you that if you can believe in me once more,\nbe certain that what I am about to say is the complete truth.\n\nI hope that when you read this you're okay,\nand that you haven't been murdered by that suspicious old lady…\n\nThe first time I met you, at a board game night, I saw you.\nVery subtly, but you stayed in my mind.\nI remember your eyes,\nand how you put on a song that only I had heard on my playlist before.\n\"Wow, that song is really good,\" I said,\nand at that moment you turned up the volume—\nhmmm, she noticed me too, I thought…\n(or maybe it was just a coincidence, or my schizophrenia, I don't know).\n\nIt wasn't until some time later that I saw you again.\nThings just happened,\nand there's no need to explain what happened that night.\nWhen I woke up in the morning, I saw you sleeping.\n\n\"Debo tener cuidado, esta chica…\nsiento algo… no debo enamorarme\" — pensé\n\nAt that moment, I couldn't have imagined\neverything we would go through together.\nTime with you was pleasant; I laughed a lot,\nthe conversations were interesting,\nand the silences became comfortable.\nI tried to keep my distance,\nbut you gradually drew me in, one step closer each time.\n\n\"Ella se irá, no te encariñes…\" — me seguía repitiendo\n\nBut who could have predicted what would happen next?\nIndeed, you left…\nand when you left, I longed with all my heart to have you back.\nWith you by my side, I felt invincible;\nI could face anything and know I would win.\nI don't know if that confidence came from me, or from you to me.\n\n\"Será que en serio vuelve?\" — me dije\n\nAnd you did.\nI started to see you more closely,\nin how you spoke to people, your soft voice\n(I have no words to describe it,\nwhen you speak like that it heals my soul),\nhow you hummed when you were concentrating,\nyour golden hair,\nthe way you took the first two sips of coffee,\nyour \"awaaaa\"s when something hurt…\n\n\"Scheiße…\" — mi armadura se ha caído,\npero aún tengo miedo\n\nI didn't need words when I was with you,\njust seeing you and appreciating you was enough.\nIt's impossible to describe how much I enjoyed our time together,\nwhere every plan and every day brought us a new adventure;\nI felt like a kid again.\nI can only be grateful to life for our paths crossing.\nYou truly were the most genuine person I've ever connected with,\nand I seriously doubt anyone will ever surpass you (pinche chancho).\nYour spirit is beautiful.\n\nYou won, Hanna.\nYou defeated me in the end.\nI lost.\n\nI'm giving you back your heart.\nI'm sorry I wasn't careful with something so important.\n\nI hope I make you smile when you think of me,\njust like I smile when I think of you.\n\nI didn't know it before, but now I know:\n\nYo te amé.`;\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
