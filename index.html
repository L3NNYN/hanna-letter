<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  html, body { margin: 0; padding: 0; background: #0a0807; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50%      { opacity: 0.6; }
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-90px) translateX(var(--drift, 10px)); opacity: 0; }
  }
  @keyframes oinkFloat {
    0%   { transform: translate(-50%, 0); opacity: 0; }
    12%  { opacity: 0.9; }
    100% { transform: translate(-50%, -70px); opacity: 0; }
  }
  @keyframes pigBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</helmet>

<div style="position:relative; min-height:100vh; width:100%; overflow:hidden; background-color:#0a0807; color:#e7c879; font-family:'Times New Roman', Times, Georgia, serif; display:flex; align-items:center; justify-content:center;">

  <div aria-hidden="true" style="position:absolute; inset:0; pointer-events:none;">
    <div style="position:absolute; top:8%; left:18%; width:2px; height:2px; border-radius:50%; background:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 5s ease-in-out infinite;"></div>
    <div style="position:absolute; top:22%; left:74%; width:2px; height:2px; border-radius:50%; background:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 7s ease-in-out infinite .8s;"></div>
    <div style="position:absolute; top:40%; left:30%; width:1px; height:1px; border-radius:50%; background:#f0d68a; box-shadow:0 0 5px 1px rgba(231,200,121,.6); animation:twinkle 6s ease-in-out infinite 1.6s;"></div>
    <div style="position:absolute; top:58%; left:82%; width:2px; height:2px; border-radius:50%; background:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 8s ease-in-out infinite .4s;"></div>
    <div style="position:absolute; top:70%; left:12%; width:1px; height:1px; border-radius:50%; background:#f0d68a; box-shadow:0 0 5px 1px rgba(231,200,121,.6); animation:twinkle 5.5s ease-in-out infinite 2.1s;"></div>
    <div style="position:absolute; top:85%; left:60%; width:2px; height:2px; border-radius:50%; background:#f0d68a; box-shadow:0 0 6px 1px rgba(231,200,121,.7); animation:twinkle 7.5s ease-in-out infinite 1.2s;"></div>
  </div>

  <sc-for list="{{ particles }}" as="p" hint-placeholder-count="14">
    <div aria-hidden="true" style="position:absolute; left:{{ p.left }}; top:{{ p.top }}; font-size:{{ p.size }}; opacity:0; --drift:{{ p.drift }}; animation:floatUp {{ p.duration }} ease-in-out infinite; animation-delay:{{ p.delay }}; filter:blur(0.3px); color:#f0d68a; text-shadow:0 0 8px rgba(231,200,121,.6); pointer-events:none;">✦</div>
  </sc-for>

  <div style="position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center;">

    <sc-for list="{{ oinks }}" as="oink" hint-placeholder-count="0">
      <div style="position:absolute; top:0; left:50%; transform:translate(-50%,0); color:#f2d898; font-size:20px; font-style:italic; white-space:nowrap; opacity:0; animation:oinkFloat 1.6s ease-out forwards; text-shadow:0 0 12px rgba(231,200,121,.4); pointer-events:none;">oink</div>
    </sc-for>

    <button key="{{ bounceKey }}" onClick="{{ onPigClick }}" style="background:none; border:none; cursor:pointer; padding:0; font-size:clamp(40px, 11vw, 68px); line-height:1; filter:drop-shadow(0 0 22px rgba(231,200,121,.28)); animation:pigBounce 0.35s ease-out; transform-origin:50% 60%;">🐷</button>

  </div>

  <div aria-hidden="true" style="position:fixed; inset:0; z-index:1; pointer-events:none; background:radial-gradient(120% 90% at 50% 20%, transparent 0%, transparent 50%, rgba(0,0,0,.5) 100%);"></div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:700}}">
class Component extends DCLogic {
  state = {
    oinks: [],
    bounceKey: 0,
  };

  renderVals() {
    return {
      particles: PARTICLES,
      oinks: this.state.oinks,
      bounceKey: this.state.bounceKey,
      onPigClick: () => this._handleClick(),
    };
  }

  _handleClick() {
    const id = Date.now() + Math.random();
    const oinks = [...this.state.oinks, { id }];
    this.setState({ oinks, bounceKey: this.state.bounceKey + 1 });
    setTimeout(() => {
      const remaining = this.state.oinks.filter((o) => o.id !== id);
      this.setState({ oinks: remaining });
    }, 1600);
  }

  componentDidMount() {
    fetch('https://ntfy.sh/hanna-letter-c7q2m9x', {
      method: 'POST',
      body: 'Viendo al chancho 🐷',
    }).catch(function () {});
  }
}

const PARTICLES = Array.from({ length: 14 }).map((_, i) => {
  const left = (5 + (i * 6.9) % 90).toFixed(1) + '%';
  const top = (10 + ((i * 37) % 80)).toFixed(1) + '%';
  const size = (4 + (i % 4) * 2) + 'px';
  const duration = (5 + (i % 5)) + 's';
  const delay = (i * 0.6) + 's';
  const drift = ((i % 2 === 0 ? 1 : -1) * (10 + (i % 3) * 6)) + 'px';
  return { left, top, size, duration, delay, drift };
});
</script>
</body>
</html>
